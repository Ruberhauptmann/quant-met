name: Build and Publish Wheels

on:
  release:
    types: [published] # Triggers automatically when you create a GitHub release

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: auto
          - os: ubuntu-24.04-arm
            arch: auto
          #- os: windows-latest
          #  arch: auto
          #- os: windows-11-arm
          #  arch: auto
          #- os: macos-15-intel
          #  arch: x86_64     # Force Intel execution
          #- os: macos-14
          #  arch: arm64      # Force Apple Silicon execution

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Tells git to fetch all tags and history

      - uses: actions/setup-python@v6

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==4.0.0

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BEFORE_ALL_LINUX: "yum install -y libgomp eigen3-devel"
          CIBW_BEFORE_ALL_MACOS: "brew install eigen libomp"
          CIBW_SKIP: "cp39-*"

      - uses: actions/upload-artifact@v6
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  publish:
    needs: [build_wheels]
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for secure trusted publishing to PyPI
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1