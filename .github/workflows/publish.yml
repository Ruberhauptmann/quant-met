name: Build and Publish Wheels

on:
  release:
    types: [published] # Triggers automatically when you create a GitHub release

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # We split the macos runners to pass custom architecture keys
        include:
          - os: ubuntu-latest
            arch: auto
          - os: windows-latest
            arch: auto
          - os: macos-13
            arch: x86_64  # Intel Mac only builds for Intel
          - os: macos-14
            arch: arm64   # Apple Silicon Mac only builds for Apple Silicon

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Tells git to fetch all tags and history

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.0 # Uses isolated docker/VM contexts to build
        env:
          CIBW_ARCHS_MACOS: ${{ matrix.arch }}
          # Tell cibuildwheel any custom environment variables if needed
          CIBW_BEFORE_ALL_LINUX: "apt install -y libeigen3-dev libomp-dev"
          CIBW_BEFORE_ALL_MACOS: "brew install eigen libomp"

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  publish:
    needs: [build_wheels]
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for secure trusted publishing to PyPI
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1